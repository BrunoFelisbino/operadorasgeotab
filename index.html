<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Operadoras — Geotab Add-In</title>
  <style>html,body{margin:0;padding:0;background:#0a0e14;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;}</style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;">
    <div style="width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;animation:spin 0.8s linear infinite;"></div>
    <span style="font-family:'Manrope',sans-serif;font-size:13px;color:#64748b;">Conectando ao Geotab...</span>
  </div>
</div>

<style id="app-styles">
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:0.4;}}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  :root{
    --bg:#0a0e14;
    --surface:#0f1628;
    --surface2:#111c32;
    --text:#e6edf3;
    --text-dim:#94a3b8;
    --text-muted:#475569;
    --border:rgba(255,255,255,0.07);
    --border-accent:rgba(0,212,255,0.25);
    --cyan:#00d4ff;
    --cyan-glow:rgba(0,212,255,0.12);
    --orange:#ff6b35;
    --orange-glow:rgba(255,107,53,0.12);
    --green:#34d399;
    --green-glow:rgba(52,211,153,0.12);
    --yellow:#fbbf24;
    --yellow-glow:rgba(251,191,36,0.12);
    --red:#f87171;
    --red-glow:rgba(248,113,113,0.12);
    --purple:#a78bfa;
    --purple-glow:rgba(167,139,250,0.12);
    --radius:10px;
    --radius-lg:14px;
    --mono:'Space Mono',monospace;
    --sans:'Manrope',sans-serif;
  }

  body,#app{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:16px 20px;
    background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:24px 24px;
  }

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}

  /* ── Header ── */
  .app-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:18px;
    padding-bottom:14px;
    border-bottom:1px solid var(--border);
  }
  .app-title{
    font-family:var(--sans);font-size:18px;font-weight:800;color:var(--text);
    letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;
  }
  .app-title-icon{
    width:32px;height:32px;border-radius:9px;background:var(--cyan);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-size:16px;box-shadow:0 0 18px rgba(0,212,255,0.35);
  }
  .app-sub{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:0.05em;}

  /* ── Status badge ── */
  .status-pill{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.18);
    border-radius:20px;padding:4px 12px;
    font-family:var(--mono);font-size:10px;color:var(--cyan);
  }
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulseDot 2s ease-in-out infinite;}
  .status-dot.green{background:var(--green);}
  .status-dot.yellow{background:var(--yellow);}
  .status-dot.red{background:var(--red);}

  /* ── Toolbar ── */
  .toolbar{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    padding:12px 16px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);margin-bottom:12px;
  }
  .toolbar-section{
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  }
  .toolbar-sep{
    width:1px;height:22px;background:var(--border);flex-shrink:0;
  }
  .btn{
    height:32px;border-radius:7px;font-family:var(--sans);font-size:11px;
    font-weight:600;padding:0 14px;cursor:pointer;border:none;
    transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{
    background:var(--cyan);color:#0a0e14;
  }
  .btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
  .btn-ghost{
    background:transparent;color:var(--text-dim);
    border:1px solid var(--border);
  }
  .btn-ghost:hover{color:var(--text);border-color:var(--border-accent);}
  .btn-danger{
    background:transparent;color:var(--red);
    border:1px solid rgba(248,113,113,0.3);
  }
  .btn-danger:hover{background:var(--red-glow);}

  .filter-input{
    height:32px;border-radius:7px;border:1px solid var(--border);
    background:#0d1117;color:var(--text);
    font-family:var(--sans);font-size:11px;padding:0 10px 0 32px;
    outline:none;transition:border-color 0.15s;
    position:relative;
  }
  .filter-input:focus{border-color:var(--border-accent);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
  .filter-input::placeholder{color:var(--text-muted);}
  .filter-select{
    height:32px;border-radius:7px;border:1px solid var(--border);
    background:#0d1117;color:var(--text);
    font-family:var(--sans);font-size:11px;padding:0 10px;
    outline:none;transition:border-color 0.15s;cursor:pointer;
  }
  .filter-select:focus{border-color:var(--border-accent);}
  .filter-select option{background:#0d1117;color:var(--text);}

  .input-wrap{position:relative;display:inline-flex;align-items:center;}
  .input-icon{
    position:absolute;left:9px;font-size:12px;color:var(--text-muted);
    pointer-events:none;z-index:1;
  }

  /* ── Info bar ── */
  .info-bar{
    display:flex;flex-wrap:wrap;gap:16px;align-items:center;
    padding:8px 14px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);
    font-size:12px;color:var(--text-dim);margin-bottom:14px;
  }
  .info-bar strong{color:var(--text);font-family:var(--mono);}

  /* ── KPI grid ── */
  .kpi-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:10px;margin-bottom:14px;
  }
  .kpi{
    padding:16px 14px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);text-align:center;
    transition:transform 0.2s,box-shadow 0.2s;
    animation:fadeUp 0.4s ease forwards;
  }
  .kpi:hover{transform:scale(1.02);box-shadow:0 0 16px rgba(0,212,255,0.1);}
  .kpi-label{
    font-family:var(--sans);font-size:9px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.08em;
    color:var(--text-muted);margin-bottom:8px;display:block;
  }
  .kpi-val{
    font-family:var(--mono);font-size:26px;font-weight:700;
    letter-spacing:-0.02em;line-height:1;
  }

  /* ── Alert / Status msg ── */
  .alert{
    padding:9px 14px;border-radius:var(--radius);font-size:12px;
    margin-bottom:12px;font-family:var(--sans);
    background:var(--cyan-glow);border:1px solid rgba(0,212,255,0.18);
    color:var(--cyan);display:flex;align-items:center;gap:8px;
  }
  .alert.warn{background:var(--yellow-glow);border-color:rgba(251,191,36,0.25);color:var(--yellow);}
  .alert.error{background:var(--red-glow);border-color:rgba(248,113,113,0.25);color:var(--red);}
  .alert.success{background:var(--green-glow);border-color:rgba(52,211,153,0.25);color:var(--green);}
  .alert[hidden]{display:none;}

  /* ── Panel ── */
  .panel{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px;
  }
  .panel-title{
    font-family:var(--sans);font-size:12px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.06em;
    color:var(--cyan);margin-bottom:12px;
    display:flex;align-items:center;gap:7px;
  }
  .panel-title::before{content:'';width:3px;height:12px;background:var(--cyan);border-radius:2px;display:inline-block;}

  /* ── Table ── */
  table{width:100%;border-collapse:collapse;font-size:11px;}
  thead tr{border-bottom:1px solid var(--border);}
  th{
    text-align:left;font-weight:700;color:var(--cyan);
    text-transform:uppercase;letter-spacing:0.06em;font-size:9px;
    padding:8px 10px;background:rgba(0,212,255,0.04);
    font-family:var(--sans);
  }
  td{
    padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);
    color:var(--text-dim);vertical-align:middle;font-family:var(--sans);
  }
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(0,212,255,0.04);}
  tbody tr[style*="cursor:pointer"]:hover td{background:rgba(0,212,255,0.06);}

  /* ── Badges ── */
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;
    font-family:var(--mono);letter-spacing:0.03em;
  }
  .b-ok{background:var(--green-glow);color:var(--green);border:1px solid rgba(52,211,153,0.2);}
  .b-warn{background:var(--yellow-glow);color:var(--yellow);border:1px solid rgba(251,191,36,0.2);}
  .b-danger{background:var(--red-glow);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
  .b-info{background:var(--cyan-glow);color:var(--cyan);border:1px solid rgba(0,212,255,0.2);}
  .b-purple{background:var(--purple-glow);color:var(--purple);border:1px solid rgba(167,139,250,0.2);}
  .b-orange{background:var(--orange-glow);color:var(--orange);border:1px solid rgba(255,107,53,0.2);}

  /* ── Map ── */
  #map-container{
    height:380px;border-radius:var(--radius-lg);
    border:1px solid var(--border);overflow:hidden;
  }
  .leaflet-container{background:#0d1117 !important;}
  .leaflet-popup-content-wrapper{
    border-radius:10px !important;
    background:#0f1628 !important;
    color:#e6edf3 !important;
    border:1px solid rgba(255,255,255,0.1) !important;
    box-shadow:0 8px 32px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip{background:#0f1628 !important;}
  .leaflet-popup-close-button{color:#475569 !important;}
  .leaflet-control-zoom{
    border:1px solid rgba(255,255,255,0.1) !important;
    border-radius:8px !important;overflow:hidden;
  }
  .leaflet-control-zoom a{background:#0f1628 !important;color:#94a3b8 !important;border-bottom:1px solid rgba(255,255,255,0.08) !important;}
  .leaflet-control-zoom a:hover{background:#111c32 !important;color:#e6edf3 !important;}

  /* ── Two-column layout ── */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:680px){
    .two-col{grid-template-columns:1fr;}
    body,#app{padding:10px;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .toolbar-section{flex-wrap:wrap;}
    .filter-select,.filter-input{width:100%;}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
  }

  /* ── Detail grid ── */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;}
  .detail-item label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:2px;}
  .detail-item span{color:var(--text);font-family:var(--mono);font-size:12px;}

  /* ── Viabilidade card ── */
  .viab-header{
    display:flex;align-items:center;gap:10px;margin-bottom:10px;
  }
  .viab-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  /* ── Chips summary ── */
  .chips-bar{
    padding:10px 12px;background:rgba(0,212,255,0.05);
    border:1px solid rgba(0,212,255,0.12);border-radius:9px;
    margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .chips-bar-label{font-size:11px;font-weight:700;color:var(--cyan);font-family:var(--sans);}

  /* ── Upload filename ── */
  .filename{font-size:11px;color:var(--text-muted);font-family:var(--mono);}

  a{color:var(--cyan);text-decoration:none;}
  a:hover{text-decoration:underline;}
</style>

<script>
(function() {
  'use strict';

  const API_BASE = 'https://mapa-tecnicos-api.onrender.com';

  const ehVivo  = op  => /vivo|telef[oô]nica/i.test(op);
  const eh3g    = t   => /3g|hspa|umts|wcdma/i.test(t);
  const eh4g    = t   => /4g|lte/i.test(t);

  const haversine = (la1, ln1, la2, ln2) => {
    const R = 6371, d2r = Math.PI/180;
    const dLa = (la2-la1)*d2r, dLn = (ln2-ln1)*d2r;
    const a = Math.sin(dLa/2)**2 + Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLn/2)**2;
    return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };

  let map=null, markersLayer=null, circle5=null, circle20=null, centerMarker=null;
  let antenas=[], veiculos=[], veiculosFiltrados=[];
  let groupMap={};   // id -> name
  let groupSel='', filtroPlaca='';

  const $ = id => document.getElementById(id);

  function saveAntenas() { try{localStorage.setItem('operadoras_antenas',JSON.stringify(antenas));}catch(e){} }
  function loadAntenas() { try{ const s=localStorage.getItem('operadoras_antenas'); if(s){antenas=JSON.parse(s);return true;} }catch(e){} return false; }

  /* ── RENDER SHELL ── */
  function renderApp() {
    $('app').innerHTML = `
      <div class="app-header">
        <div class="app-title">
          <div class="app-title-icon">📡</div>
          <div>
            Análise de Cobertura
            <div class="app-sub">OPERADORAS GEOTAB</div>
          </div>
        </div>
        <div id="geotab-pill" class="status-pill">
          <span class="status-dot"></span>
          <span id="geotab-label">Conectando...</span>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-section">
          <input type="file" id="ant-upload" accept=".xlsx,.xls,.csv" style="display:none"/>
          <button class="btn btn-primary" id="btn-ant-upload">📂 Importar planilha</button>
          <button class="btn btn-ghost" id="btn-ant-backend">☁️ Carregar servidor</button>
          <button class="btn btn-danger" id="btn-clear-cache">🗑 Cache</button>
          <span class="filename" id="ant-filename">Nenhum arquivo</span>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-section">
          <select class="filter-select" id="filtro-grupo" style="min-width:150px;">
            <option value="">Todos os grupos</option>
          </select>
          <div class="input-wrap">
            <span class="input-icon">🔍</span>
            <input type="text" class="filter-input" id="filtro-placa" placeholder="Placa ou nome..." style="width:160px;"/>
          </div>
        </div>
      </div>

      <!-- Info bar -->
      <div class="info-bar">
        <span>📡 Antenas: <strong id="ant-count">0</strong></span>
        <span>🚛 Veículos ativos: <strong id="veic-count">0</strong></span>
        <span id="filtro-status" style="display:none;color:var(--cyan);font-size:11px;"></span>
      </div>

      <div id="alert-box" class="alert" hidden></div>

      <div id="kpi-area" style="display:none;">
        <!-- KPIs -->
        <div class="kpi-grid" id="kpi-grid"></div>

        <!-- Detail panels -->
        <div class="two-col">
          <div class="panel">
            <div class="panel-title">Veículo</div>
            <div id="veic-detalhes" style="font-size:12px;color:var(--text-muted);">Nenhum veículo selecionado</div>
          </div>
          <div class="panel">
            <div class="panel-title">Viabilidade</div>
            <div id="viabilidade" style="font-size:12px;color:var(--text-muted);">Selecione um veículo para análise</div>
          </div>
        </div>

        <!-- Operadoras table -->
        <div class="panel">
          <div class="panel-title">Operadoras no raio 20 km</div>
          <div id="tabela-operadoras"></div>
        </div>

        <!-- Frota -->
        <div class="panel">
          <div class="panel-title">Análise da frota</div>
          <div id="analise-frota"></div>
        </div>

        <!-- Map -->
        <div class="panel">
          <div class="panel-title">Mapa</div>
          <div id="map-container"></div>
        </div>
      </div>
    `;

    $('btn-ant-upload').addEventListener('click', ()=>$('ant-upload').click());
    $('ant-upload').addEventListener('change', uploadAntenas);
    $('btn-ant-backend').addEventListener('click', loadAntBackend);
    $('btn-clear-cache').addEventListener('click', ()=>{
      localStorage.removeItem('operadoras_antenas');
      antenas=[];
      updateCounts();
      setAlert('Cache de antenas limpo.','');
    });
    $('filtro-grupo').addEventListener('change', aplicarFiltros);
    $('filtro-placa').addEventListener('input', aplicarFiltros);
  }

  /* ── UI HELPERS ── */
  function setAlert(msg, type) {
    const el=$('alert-box');
    if(!el)return;
    if(!msg){el.hidden=true;return;}
    el.hidden=false;
    el.className='alert '+(type||'');
    el.innerHTML=msg;
  }

  function setGeotabStatus(label, state) {
    const lbl=$('geotab-label'); if(!lbl)return;
    lbl.textContent=label;
    const dot=$('geotab-pill')?.querySelector('.status-dot');
    if(dot){dot.className='status-dot '+(state||'');}
  }

  function updateCounts() {
    const a=$('ant-count'), v=$('veic-count');
    if(a) a.textContent=antenas.length.toLocaleString('pt-BR');
    if(v) v.textContent=veiculos.length.toLocaleString('pt-BR');
  }

  /* ── ANTENAS ── */
  async function loadAntBackend() {
    setAlert('Carregando antenas do servidor...','');
    try {
      const r=await fetch(API_BASE+'/api/antennas');
      if(!r.ok) throw new Error('Servidor indisponível ('+r.status+')');
      const j=await r.json();
      if(!j.data||!j.data.length) throw new Error('Nenhuma antena no servidor');
      antenas=j.data.map(a=>({
        id:a.id, nome:a.numero_estacao||'Antena '+a.id,
        operadora:a.operadora||'N/I', tecnologia:a.tecs||'N/I',
        faixa:a.faixa||'',
        lat:parseFloat(a.latitude), lng:parseFloat(a.longitude),
        endereco:[a.logradouro,a.bairro,a.mun,a.sigla_uf].filter(Boolean).join(', '),
      })).filter(a=>!isNaN(a.lat)&&!isNaN(a.lng));
      setAlert('✅ '+antenas.length+' antenas carregadas do servidor.','success');
      saveAntenas(); updateCounts(); renderAnalysis();
    } catch(e) { setAlert('❌ '+e.message,'error'); }
  }

  function uploadAntenas(e) {
    const file=e.target.files[0]; if(!file)return;
    const fn=$('ant-filename'); fn.textContent='⏳ '+file.name+'...';
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        let rows;
        if(file.name.endsWith('.csv')) rows=parseCSV(ev.target.result);
        else {
          const wb=XLSX.read(ev.target.result,{type:'array'});
          rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        }
        antenas=rows.map((r,i)=>({
          id:i+1,
          nome:r['Número Estação']||r['Nome']||r['name']||'Antena '+(i+1),
          operadora:r['Operadora']||r['operadora']||'N/I',
          tecnologia:r['Tecs']||r['Tecnologia']||r['tecnologia']||'N/I',
          faixa:r['Faixa']||'',
          lat:parseFloat(r['Latitude']||r['lat']||0),
          lng:parseFloat(r['Longitude']||r['lng']||0),
          endereco:(r['Logradouro']||'')+', '+(r['Bairro']||'')+' - '+(r['MUN']||'')+'/'+(r['SiglaUf']||''),
        })).filter(a=>!isNaN(a.lat)&&!isNaN(a.lng)&&a.lat!==0&&a.lng!==0);
        fn.textContent='✅ '+file.name+' ('+antenas.length+' antenas)';
        saveAntenas(); updateCounts(); renderAnalysis();
        setAlert('✅ '+antenas.length+' antenas carregadas.','success');
      } catch(err) {
        fn.textContent='❌ Erro ao ler '+file.name;
        setAlert('❌ '+err.message,'error');
      }
    };
    if(file.name.endsWith('.csv')) reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
  }

  function parseCSV(text) {
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return[];
    const hdrs=lines[0].split(/[,;]/).map(h=>h.trim().replace(/^["']|["']$/g,''));
    return lines.slice(1).map(line=>{
      const vals=line.split(/[,;]/).map(v=>v.trim().replace(/^["']|["']$/g,''));
      const o={}; hdrs.forEach((h,i)=>{o[h]=vals[i]||'';});
      return o;
    }).filter(r=>r[hdrs[0]]);
  }

  /* ── FILTROS ── */
  function aplicarFiltros() {
    groupSel=$('filtro-grupo').value;          // ID do grupo
    filtroPlaca=$('filtro-placa').value.toLowerCase().trim();
    veiculosFiltrados=veiculos.filter(v=>{
      // filtro de grupo: compara IDs
      if(groupSel && !v.grupos.includes(groupSel)) return false;
      // filtro de placa / nome
      if(filtroPlaca) {
        const haystack=(v.placa+' '+v.nome).toLowerCase();
        if(!haystack.includes(filtroPlaca)) return false;
      }
      return true;
    });
    const fs=$('filtro-status');
    if(fs){
      if(groupSel||filtroPlaca){
        fs.style.display='inline';
        fs.textContent='Filtro ativo: '+veiculosFiltrados.length+' veículo'+(veiculosFiltrados.length!==1?'s':'');
      } else {
        fs.style.display='none';
      }
    }
    renderAnalysis();
  }

  /* ── ANALYSIS ── */
  function renderAnalysis() {
    $('kpi-area').style.display='block';
    if(antenas.length===0) return;
    if(veiculosFiltrados.length===0){
      $('analise-frota').innerHTML='<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:13px;">Nenhum veículo'+(groupSel||filtroPlaca?' com os filtros atuais':' ativo no Geotab')+'.</div>';
      $('kpi-grid').innerHTML='';
      if(map&&markersLayer) markersLayer.clearLayers();
      return;
    }

    const resultados=veiculosFiltrados.map(v=>{
      const res=antenas.map(a=>({...a, distanciaKm:haversine(v.lat,v.lng,a.lat,a.lng)}));
      const d5=res.filter(a=>a.distanciaKm<=5).length;
      const d20=res.filter(a=>a.distanciaKm<=20).length;
      const ops5={};
      res.forEach(a=>{
        if(a.distanciaKm<=5){
          if(!ops5[a.operadora]) ops5[a.operadora]=new Set();
          ops5[a.operadora].add(a.tecnologia);
        }
      });
      const temVivo3g=Object.entries(ops5).some(([op,t])=>ehVivo(op)&&[...t].some(eh3g));
      const temVivo4g=Object.entries(ops5).some(([op,t])=>ehVivo(op)&&[...t].some(eh4g));
      const temOutra3g=Object.entries(ops5).some(([op,t])=>!ehVivo(op)&&[...t].some(eh3g));

      let sugestao, operadoras, status;
      if(temVivo3g){
        sugestao='✅ Vivo 3G'; status='ok';
        const k=Object.keys(ops5).find(k=>ehVivo(k));
        operadoras=k?[...ops5[k]].join('/'):'Vivo 3G';
      } else if(!Object.keys(ops5).length){
        sugestao='❌ Sem cobertura'; operadoras='Nenhuma operadora no raio de 5 km'; status='sem_cobertura';
      } else if(temOutra3g){
        sugestao='🤝 Reaprov. 3G';
        operadoras=Object.entries(ops5).filter(([op,t])=>!ehVivo(op)&&[...t].some(eh3g)).map(([op,t])=>op+' ('+[...t].join('/')+')').join(', ');
        status='reaproveitar_3g';
      } else if(temVivo4g){
        sugestao='📶 Trocar 4G'; operadoras='Vivo 4G disponível'; status='trocar_4g';
      } else {
        sugestao='🔄 Trocar op.';
        operadoras=Object.entries(ops5).filter(([op])=>!ehVivo(op)).map(([op,t])=>op+' ('+[...t].join('/')+')').join(', ');
        status='trocar_op';
      }
      return{v,d5,d20,sugestao,operadoras,status};
    });

    const cnt=(s)=>resultados.filter(r=>r.status===s).length;
    $('kpi-grid').innerHTML=[
      {lbl:'✅ Vivo 3G',     val:cnt('ok'),             col:'var(--green)'},
      {lbl:'📶 Trocar 4G',   val:cnt('trocar_4g'),       col:'var(--yellow)'},
      {lbl:'🤝 Reaprov. 3G', val:cnt('reaproveitar_3g'), col:'var(--purple)'},
      {lbl:'🔄 Trocar op.',  val:cnt('trocar_op'),       col:'var(--orange)'},
      {lbl:'❌ Sem cobertura',val:cnt('sem_cobertura'),   col:'var(--red)'},
    ].map((k,i)=>`<div class="kpi" style="animation-delay:${i*0.07}s">
      <span class="kpi-label">${k.lbl}</span>
      <strong class="kpi-val" style="color:${k.col}">${k.val}</strong>
    </div>`).join('');

    renderTabelaOperadoras();
    renderAnaliseFrota(resultados);
    if(!map) initMap();
    plotAllVehicles(resultados);
    if(veiculosFiltrados.length>0) showVehicleDetails(0, resultados[0]);
  }

  function renderTabelaOperadoras() {
    const agg={};
    veiculosFiltrados.forEach(v=>{
      antenas.forEach(a=>{
        const d=haversine(v.lat,v.lng,a.lat,a.lng);
        if(d>20)return;
        if(!agg[a.operadora]) agg[a.operadora]={total:0,d5:0,tecs:new Set()};
        agg[a.operadora].total++; agg[a.operadora].tecs.add(a.tecnologia);
        if(d<=5) agg[a.operadora].d5++;
      });
    });
    const rows=Object.entries(agg).sort((a,b)=>b[1].total-a[1].total).map(([op,info])=>{
      const isVivo=ehVivo(op);
      return `<tr>
        <td><span style="display:inline-flex;align-items:center;gap:6px;">
          <span style="width:7px;height:7px;border-radius:50%;background:${isVivo?'var(--cyan)':'var(--orange)'};box-shadow:0 0 6px ${isVivo?'rgba(0,212,255,0.5)':'rgba(255,107,53,0.5)'};flex-shrink:0;"></span>
          <strong style="color:var(--text);">${op}</strong>
        </span></td>
        <td>${[...info.tecs].map(t=>`<span class="badge b-info" style="margin-right:3px;">${t}</span>`).join('')}</td>
        <td><span style="font-family:var(--mono);color:var(--text);">${info.total}</span></td>
        <td><span style="font-family:var(--mono);color:var(--cyan);">${info.d5}</span></td>
      </tr>`;
    }).join('');
    $('tabela-operadoras').innerHTML=`<table>
      <thead><tr><th>Operadora</th><th>Tecnologias</th><th>Total 20 km</th><th>Raio 5 km</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-muted);">Nenhuma antena no raio</td></tr>'}</tbody>
    </table>`;
  }

  function renderAnaliseFrota(resultados) {
    const chips={};
    resultados.filter(r=>r.status==='reaproveitar_3g'||r.status==='trocar_op').forEach(r=>{
      r.operadoras.split(',').forEach(part=>{
        const m=part.trim().match(/^([^(]+)/);
        if(m){const op=m[1].trim();if(op&&!ehVivo(op)) chips[op]=(chips[op]||0)+1;}
      });
    });
    const totalChips=Object.values(chips).reduce((s,v)=>s+v,0);

    let html='';
    if(totalChips>0){
      html+=`<div class="chips-bar">
        <span class="chips-bar-label">📦 Chips: ${totalChips}</span>
        ${Object.entries(chips).sort((a,b)=>b[1]-a[1]).map(([op,q])=>`<span class="badge b-info">${op}: ${q}</span>`).join('')}
      </div>`;
    }

    const statusBadge=s=>({
      ok:'b-ok',trocar_4g:'b-warn',reaproveitar_3g:'b-purple',
      trocar_op:'b-orange',sem_cobertura:'b-danger'
    }[s]||'b-info');

    html+=`<table>
      <thead><tr>
        <th>Veículo</th><th>Placa</th>
        <th>5 km</th><th>20 km</th>
        <th>Operadoras 5 km</th><th>Recomendação</th>
      </tr></thead>
      <tbody>
        ${resultados.map(({v,d5,d20,sugestao,operadoras,status},i)=>`
          <tr onclick="window._sel(${i})" style="cursor:pointer;">
            <td><strong style="color:var(--text);">${v.nome}</strong></td>
            <td><span style="font-family:var(--mono);font-size:10px;">${v.placa||'—'}</span></td>
            <td><span style="font-family:var(--mono);color:var(--text);">${d5}</span></td>
            <td><span style="font-family:var(--mono);color:var(--text-dim);">${d20}</span></td>
            <td style="font-size:10px;color:var(--text-muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${operadoras}</td>
            <td><span class="badge ${statusBadge(status)}">${sugestao}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
    $('analise-frota').innerHTML=html;
  }

  window._sel=function(idx){
    const v=veiculosFiltrados[idx]; if(!v)return;
    const res=antenas.map(a=>({...a,distanciaKm:haversine(v.lat,v.lng,a.lat,a.lng)}));
    const d5=res.filter(a=>a.distanciaKm<=5);
    const d20=res.filter(a=>a.distanciaKm<=20);
    showVehicleDetails(idx,{v,d5:d5.length,d20:d20.length});
    showViabilidade(d20,d5,v);
    plotQuery(v.lat,v.lng,d20,v);
  };

  function showVehicleDetails(idx,r){
    if(!r)return;
    const v=r.v;
    const diasHTML=v.diasSemSinal>=0
      ?`<div class="detail-item"><label>Sem sinal</label><span style="color:${v.diasSemSinal>7?'var(--red)':v.diasSemSinal>2?'var(--yellow)':'var(--green)'};">${v.diasSemSinal}d</span></div>`:'';
    $('veic-detalhes').innerHTML=`<div class="detail-grid">
      <div class="detail-item"><label>Nome</label><span>${v.nome}</span></div>
      <div class="detail-item"><label>Placa</label><span>${v.placa||'—'}</span></div>
      <div class="detail-item"><label>Latitude</label><span>${v.lat.toFixed(5)}</span></div>
      <div class="detail-item"><label>Longitude</label><span>${v.lng.toFixed(5)}</span></div>
      <div class="detail-item"><label>Status</label><span style="color:${v.online?'var(--green)':'var(--red)'};">${v.online?'● Online':'● Offline'}</span></div>
      ${diasHTML}
    </div>`;
  }

  function showViabilidade(d20,d5,v){
    const hV3=d5.some(a=>ehVivo(a.operadora)&&eh3g(a.tecnologia));
    const hV4=d5.some(a=>ehVivo(a.operadora)&&eh4g(a.tecnologia));
    const hO3=d5.some(a=>!ehVivo(a.operadora)&&eh3g(a.tecnologia));
    const viv20=d20.filter(a=>ehVivo(a.operadora));
    const out20=d20.filter(a=>!ehVivo(a.operadora));
    let rec={cor:'var(--green)',txt:'✅ Vivo 3G',acao:'Cobertura Vivo 3G disponível no raio de 5 km.'};
    if(!hV3&&!hV4&&hO3)
      rec={cor:'var(--purple)',txt:'🤝 Reaproveitar 3G',acao:'Outra operadora cobre com 3G. Verificar custo de chip.'};
    else if(!hV3&&hV4)
      rec={cor:'var(--yellow)',txt:'📶 Trocar para 4G',acao:'Vivo disponível em 4G. Equipamento precisa ser compatível.'};
    else if(!hV3&&!hO3){
      const best=Object.entries(out20.reduce((ac,a)=>{if(!ehVivo(a.operadora)){if(!ac[a.operadora])ac[a.operadora]=new Set();ac[a.operadora].add(a.tecnologia);}return ac;},{})).sort((a,b)=>b[1].size-a[1].size)[0];
      if(best) rec={cor:'var(--orange)',txt:'🔄 Trocar operadora',acao:'Vivo sem cobertura. '+best[0]+' disponível a 20 km — avaliar troca de SIM/contrato.'};
      else rec={cor:'var(--red)',txt:'❌ Sem cobertura',acao:'Nenhuma operadora com cobertura na região.'};
    }
    $('viabilidade').innerHTML=`
      <div class="viab-header">
        <span class="viab-dot" style="background:${rec.cor};box-shadow:0 0 8px ${rec.cor}80;"></span>
        <strong style="color:var(--text);font-size:13px;">${rec.txt}</strong>
      </div>
      <p style="font-size:11px;color:var(--text-dim);line-height:1.6;margin-bottom:10px;">${rec.acao}</p>
      <div class="detail-grid" style="gap:6px;">
        <div class="detail-item"><label>Vivo 3G</label><span>${viv20.filter(a=>eh3g(a.tecnologia)).length} ant.</span></div>
        <div class="detail-item"><label>Vivo 4G</label><span>${viv20.filter(a=>eh4g(a.tecnologia)).length} ant.</span></div>
        <div class="detail-item"><label>Outras op.</label><span>${out20.length} ant.</span></div>
      </div>`;
  }

  /* ── MAP ── */
  function initMap(){
    const c=$('map-container'); if(!c)return;
    map=L.map(c,{zoomControl:true}).setView([-15.8,-47.9],4);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OSM'}).addTo(map);
    markersLayer=L.layerGroup().addTo(map);
    setTimeout(()=>map&&map.invalidateSize(),500);
  }

  function vehicleColor(status){
    return {ok:'#34d399',trocar_4g:'#fbbf24',reaproveitar_3g:'#a78bfa',trocar_op:'#ff6b35',sem_cobertura:'#f87171'}[status]||'#94a3b8';
  }

  function plotAllVehicles(resultados){
    if(!markersLayer)return;
    markersLayer.clearLayers();
    resultados.forEach(({v,sugestao,status},i)=>{
      const col=vehicleColor(status);
      const m=L.circleMarker([v.lat,v.lng],{radius:8,fillColor:col,color:'rgba(255,255,255,0.6)',weight:1.5,fillOpacity:0.85});
      m.bindPopup(`<b style="color:#e6edf3;">${v.nome}</b><br><span style="color:#94a3b8;font-size:11px;">${v.placa||''}</span><br>${sugestao}`);
      m.on('click',()=>window._sel(i));
      markersLayer.addLayer(m);
    });
    if(veiculos.length>0){
      const aLat=veiculos.reduce((s,v)=>s+v.lat,0)/veiculos.length;
      const aLng=veiculos.reduce((s,v)=>s+v.lng,0)/veiculos.length;
      map.setView([aLat,aLng],5);
    }
    setTimeout(()=>map&&map.invalidateSize(),200);
  }

  function plotQuery(lat,lng,d20,v){
    if(!map)initMap();
    if(!markersLayer)return;
    markersLayer.clearLayers();
    if(centerMarker)map.removeLayer(centerMarker);
    centerMarker=L.marker([lat,lng],{
      icon:L.divIcon({className:'',html:'<div style="background:#00d4ff;color:#0a0e14;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.8);font-size:13px;font-weight:700;box-shadow:0 0 16px rgba(0,212,255,0.6);">🚛</div>',iconSize:[26,26],iconAnchor:[13,13]})
    }).addTo(map);
    if(v)centerMarker.bindPopup(`<b style="color:#e6edf3;">${v.nome}</b>`);
    if(circle5)map.removeLayer(circle5);
    if(circle20)map.removeLayer(circle20);
    circle5=L.circle([lat,lng],{radius:5000,color:'#34d399',fillColor:'#34d399',fillOpacity:0.05,weight:1.5,dashArray:'4 4'}).addTo(map);
    circle20=L.circle([lat,lng],{radius:20000,color:'#fbbf24',fillColor:'#fbbf24',fillOpacity:0.03,weight:1,dashArray:'4 6'}).addTo(map);
    d20.forEach(a=>{
      const col=ehVivo(a.operadora)?'#00d4ff':'#ff6b35';
      const m=L.circleMarker([a.lat,a.lng],{radius:5,fillColor:col,color:'rgba(255,255,255,0.5)',weight:0.8,fillOpacity:0.75});
      m.bindPopup(`<b style="color:#e6edf3;">${a.nome}</b><br><span style="color:#94a3b8;font-size:11px;">${a.operadora} — ${a.tecnologia}</span><br><span style="font-size:10px;color:#64748b;">📏 ${a.distanciaKm.toFixed(2)} km</span>`);
      markersLayer.addLayer(m);
    });
    map.setView([lat,lng],11);
    setTimeout(()=>map&&map.invalidateSize(),200);
  }

  /* ── GEOTAB INIT ── */
  function init(api) {
    try {
      $('app').innerHTML='';
      renderApp();
      updateCounts();
      if(loadAntenas()){
        setAlert('📦 Antenas restauradas do cache ('+antenas.length+').','');
        updateCounts();
      }
    } catch(e){
      console.error(e);
      $('app').innerHTML='<div style="padding:20px;color:#f87171;font-family:sans-serif;font-size:13px;">❌ Erro ao carregar: '+e.message+'<br><small style="color:#8b949e;">Verifique o console (F12).</small></div>';
      return;
    }

    if(!api){ setGeotabStatus('Não conectado ao Geotab','red'); return; }

    setGeotabStatus('Carregando dispositivos...','yellow');
    const timeout=setTimeout(()=>setGeotabStatus('Timeout — verifique permissões','red'),15000);

    const deviceMap={};

    // 1. Carrega grupos
    api.call('Get',{typeName:'Group'},function(allGroups){
      // Monta mapa id->name e preenche select
      allGroups.forEach(g=>{ if(g.id&&g.name) groupMap[g.id]=g.name; });
      const sel=$('filtro-grupo');
      if(sel){
        const opts=allGroups.filter(g=>g.name&&g.name!=='GroupCompanyId'&&g.name!=='GroupNothingId')
          .sort((a,b)=>a.name.localeCompare(b.name));
        sel.innerHTML='<option value="">Todos os grupos</option>'+
          opts.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
      }
    },function(){/* ignora erro de grupos */});

    // 2. Carrega dispositivos (excluindo arquivados)
    api.call('Get',{typeName:'Device',
      search:{
        // Filtra apenas ativos na API quando possível
        fromDate:'1986-01-01T00:00:00Z'  // devices ativos têm fromDate definido
      }
    },function(allDevices){
      // Filtra arquivados: isArchived===true OU isActive===false OU serialNumber===''
      allDevices.forEach(d=>{
        const arquivado = d.isArchived===true || d.isActive===false || d.name===''||d.name==null;
        if(!arquivado){
          deviceMap[d.id]={
            name:d.name||d.id,
            licensePlate:d.licensePlate||d.name||d.id,
            // groups é array de {id:...}
            grupos:(d.groups||[]).map(g=>g.id)
          };
        }
      });

      // 3. Carrega posições GPS
      api.call('Get',{typeName:'DeviceStatusInfo'},function(result){
        clearTimeout(timeout);
        if(!result||!result.length){
          setGeotabStatus('Nenhum veículo encontrado','yellow'); return;
        }
        veiculos=result
          .filter(v=>v.latitude!=null&&v.longitude!=null&&v.device&&deviceMap[v.device.id])
          .map(v=>{
            const info=deviceMap[v.device.id];
            const dias=v.dateTime?Math.floor((Date.now()-new Date(v.dateTime))/86400000):-1;
            return{
              nome:info.name,
              placa:info.licensePlate,
              lat:Number(v.latitude),
              lng:Number(v.longitude),
              ultimoGps:v.dateTime?new Date(v.dateTime):null,
              diasSemSinal:dias,
              online:!!v.isDeviceCommunicating,
              grupos:info.grupos
            };
          });
        veiculosFiltrados=[...veiculos];
        setGeotabStatus(veiculos.length+' veículos ativos','green');
        updateCounts();
        renderAnalysis();
      },function(err){
        clearTimeout(timeout);
        setGeotabStatus('Erro GPS: '+(err&&err.message?err.message:'erro'),'red');
      });
    },function(){
      // Fallback: sem deviceMap — só GPS, sem filtro de arquivados
      setGeotabStatus('Sem lista de devices — carregando GPS...','yellow');
      api.call('Get',{typeName:'DeviceStatusInfo'},function(result){
        clearTimeout(timeout);
        if(!result||!result.length){ setGeotabStatus('Nenhum veículo','yellow'); return; }
        veiculos=result.filter(v=>v.latitude!=null&&v.longitude!=null)
          .map(v=>({
            nome:v.device?v.device.id:'',
            placa:v.device?v.device.id:'',
            lat:Number(v.latitude),lng:Number(v.longitude),
            ultimoGps:v.dateTime?new Date(v.dateTime):null,
            diasSemSinal:v.dateTime?Math.floor((Date.now()-new Date(v.dateTime))/86400000):-1,
            online:!!v.isDeviceCommunicating,
            grupos:[]
          }));
        veiculosFiltrados=[...veiculos];
        setGeotabStatus(veiculos.length+' veículos (sem filtro de grupos)','yellow');
        updateCounts(); renderAnalysis();
      },function(err){
        clearTimeout(timeout);
        setGeotabStatus('Erro: '+(err&&err.message?err.message:'desconhecido'),'red');
      });
    });
  }

  geotab.addin.operadoras=function(){
    return{
      initialize:function(api,state,callback){
        try{init(api);}catch(e){console.error(e);}
        if(callback)callback();
      },
      focus:function(){ if(map) setTimeout(()=>map.invalidateSize(),200); },
      blur:function(){}
    };
  };
})();
</script>
</body>
